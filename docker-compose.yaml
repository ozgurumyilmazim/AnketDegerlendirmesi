services:
  # --- POSTGRESQL VERİTABANI SERVİSİ ---
  db:
    image: postgres:15-alpine # Alpine imajı hem daha güvenli hem daha hafiftir
    container_name: selma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
      POSTGRES_DB: ${DB_NAME:-mydatabase}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - pg_backups:/backups
    ports:
      - "127.0.0.1:5432:5432" # Sadece yerel yönetim bağlantıları için güvenli port
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2GB
        reservations:
          cpus: '0.5'
          memory: 512MB

  # --- POSTGREST API SERVİSİ ---
  api:
    image: postgrest/postgrest:v12.0.2
    container_name: selma_api
    restart: unless-stopped
    volumes:
      # Statik ayarları barındıran dış dosyayı container içine bağlıyoruz
      - ./postgrest.conf:/etc/postgrest.conf:ro
    environment:
      # Kural: Sadece hassas ve dinamik (.env tabanlı) ayarları burada tutuyoruz.
      # Diğer tüm statik ayarlar (port, şema, havuz vb.) artık doğrudan 'postgrest.conf' içerisinden okunacak.
      # JWT signing secret'ı PostgreSQL connection options ile de iletiyoruz (api.login() içinde app.jwt_secret okunur)
      PGRST_DB_URI: "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-securepassword123}@selma_db:5432/${DB_NAME:-mydatabase}?options=-c%20app.jwt_secret%3D${JWT_SECRET}"
      PGRST_JWT_SECRET: "${JWT_SECRET}"
      # Anonim (JWT'siz) istekler için kullanılacak PostgreSQL rolü
      PGRST_DB_ANON_ROLE: "anon"
      # API ve public şemaları (config dosyasındaki db-schemas geçersiz kılınır)
      PGRST_DB_SCHEMAS: "api,public"
    networks:
      - backend-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1GB

  # --- PGADMIN YÖNETİM PANELİ SERVİSİ ---
  pgadmin:
    image: dpage/pgadmin4:9.16
    container_name: selma_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-adminpassword123}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:80" 
    networks:
      - backend-network
    depends_on:
      - db

  # --- NGINX REVERSE PROXY & FRONTEND SERVİSİ ---
  nginx:
    image: nginx:alpine
    container_name: selma_onyuz
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - backend-network
    depends_on:
      - pgadmin
      - api

# --- NETWORKS (AĞLAR) ---
networks:
  backend-network:
    driver: bridge

# --- VOLUMES (HACİMLER) ---
volumes:
  pg_data:
  pg_backups:
  pgadmin_data: