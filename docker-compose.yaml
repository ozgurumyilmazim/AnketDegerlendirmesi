services:
  # --- POSTGRESQL VERİTABANI SERVİSİ ---
  db:
    image: postgres:15-alpine # Alpine imajı hem daha güvenli hem daha hafiftir
    container_name: selma_db
    restart: unless-stopped
    # 1. Madde: Güvenlik için şifreleri doğrudan buraya yazmak yerine .env dosyasından çekiyoruz
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
      POSTGRES_DB: ${DB_NAME:-mydatabase}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # 3. Madde: Yedekleme (backup) dosyalarını güvenle saklayacağımız volume
      - pg_backups:/backups
    ports:
      - "127.0.0.1:5432:5432" # 1. Madde: Güvenlik için dış dünyaya kapatıp sadece localhost'a açıyoruz
    networks:
      - backend-network
    # 1. Madde: Performans ve kararlılık için kaynak sınırlandırması (Resource Limits)
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2GB
        reservations:
          cpus: '0.5'
          memory: 512MB

# --- POSTGREST API SERVİSİ ---
  api:
    image: postgrest/postgrest:v12.0.2 # Güncel ve kararlı PostgREST sürümü
    container_name: selma_api
    restart: unless-stopped
    environment:
      # Veritabanı bağlantı dizesi
      PGRST_DB_URI: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-securepassword123}@selma_db:5432/${DB_NAME:-mydatabase}
      # API olarak sunulacak PostgreSQL şeması
      PGRST_DB_SCHEMA: ${PGRST_SCHEMA:-public}
      # Kimlik doğrulaması olmadan yapılacak istekler için varsayılan rol
      # Güvenlik uyarısı: Üretim ortamında buraya kısıtlı yetkili bir rol verilmelidir (Bkz: Kılavuz)
      PGRST_DB_ANON_ROLE: ${PGRST_ANON_ROLE:-postgres}
    networks:
      - backend-network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1GB

  # --- PGADMIN YÖNETİM PANELİ SERVİSİ ---
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: selma_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-adminpassword123}
      # Güvenlik için gelişmiş çerez koruması
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    volumes:
      # 2. Madde: Kaydedilen sunucuların silinmemesi için kalıcı (persistent) volume
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:80" # Güvenlik gerekçesiyle sadece localhost üzerinden erişim (Nginx arkasına alınabilir)
    networks:
      - backend-network
    depends_on:
      - db

  # --- NGINX REVERSE PROXY SERVİSİ ---
  nginx:
    image: nginx:alpine
    container_name: selma_onyuz
    restart: unless-stopped
    volumes:
      # 4. Madde: Tüm klasör yerine sadece default.conf dosyasını read-only (ro) olarak bağlıyoruz
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
#    ports:
#      - "80:80"
#      - "443:443"
    networks:
      - backend-network
    depends_on:
      - pgadmin

# --- NETWORKS (AĞLAR) ---
networks:
  backend-network:
    driver: bridge # Servislerin birbirleriyle güvenli ve izole konuşmasını sağlar

# --- VOLUMES (HACİMLER) ---
volumes:
  pg_data: # PostgreSQL ana veri tabanı dosyaları
  pg_backups: # 3. Madde: Yedeklemeler için ayrılmış kalıcı alan
  pgadmin_data: # 2. Madde: pgAdmin ayarları ve sunucu bilgileri için kalıcı alan