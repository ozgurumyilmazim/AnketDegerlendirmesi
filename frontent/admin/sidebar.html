<script>
// Aktif sayfa belirleme
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop();
    
    // Tüm nav linklerinden active class'ını kaldır
    document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
    });
    
    // Mevcut sayfaya göre active class ekle
    switch(currentPage) {
        case 'dashboard.html':
            document.getElementById('nav-dashboard').classList.add('active');
            break;
        case 'test-results.html':
            document.getElementById('nav-test-results').classList.add('active');
            break;
        case 'reports.html':
            document.getElementById('nav-reports').classList.add('active');
            break;
        case 'questions.html':
            document.getElementById('nav-questions').classList.add('active');
            break;
        case 'task-definitions.html':
            document.getElementById('nav-task-definitions').classList.add('active');
            break;
        case 'settings.html':
        case 'settings-kvkk.html':
        case 'settings-admins.html':
        case 'settings-letters.html':
        case 'settings-pages.html':
        case 'settings-categories.html':
            document.getElementById('nav-settings').classList.add('active');
            break;
    }
});

// Sidebar toggle fonksiyonları
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    
    if (window.innerWidth <= 768) {
        sidebar.classList.toggle('show');
    }
}

function collapseSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    
    sidebar.classList.toggle('collapsed');
    mainContent.classList.toggle('expanded');
}
</script>
