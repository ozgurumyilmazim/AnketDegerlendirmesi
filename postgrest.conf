# PostgREST configuration for MMPI Test System
# NOTE: This config file is NOT used in production.
# PostgREST container is configured via environment variables (docker run -e).
# See below for the equivalent env vars.
#
# Production env vars (set on the container):
#   PGRST_DB_URI          = "postgres://mmpi_user:mmpi_password@db:5432/mmpi_db"
#   PGRST_DB_ANON_ROLE    = "anon"
#   PGRST_DB_SCHEMAS      = "api,public"
#   PGRST_JWT_SECRET      = "super-secret-jwt-key-change-this-in-production"
#   PGRST_DB_PRE_REQUEST  = "api.set_jwt_secret"
#   PGRST_SERVER_HOST     = "0.0.0.0"
#   PGRST_SERVER_PORT     = "3000"
#   PGRST_DB_POOL         = "10"
#
#   db-pre-request takes a FUNCTION NAME (not inline SQL).
#   api.set_jwt_secret() calls: set_config('app.jwt_secret', '...', true)

db-uri = "postgres://mmpi_user:mmpi_password@db:5432/mmpi_db"
db-schemas = "api,public"
db-anon-role = "anon"
jwt-secret = "super-secret-jwt-key-change-this-in-production"
db-pre-request = "api.set_jwt_secret"
server-port = 3000
server-host = "0.0.0.0"
cors-origin = "*"
