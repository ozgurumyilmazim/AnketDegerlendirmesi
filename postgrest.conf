# ==============================================================================
# POSTGREST STATİK KONFİGÜRASYON DOSYASI (postgrest.conf)
# ==============================================================================
# Not: Hassas veriler (db-uri ve jwt-secret) güvenlik amacıyla bu dosyaya yazılmamış,
# docker-compose.yml içindeki çevre değişkenlerinden (environment) okunmaktadır.
# PostgREST, çevre değişkenlerini buradaki değerlerin üzerinde ezer (override).

# --- ŞEMA VE ROL AYARLARI ---

# API üzerinden dış dünyaya sunulacak PostgreSQL şemaları.
# İlk yazılan şema varsayılan (default) şema olarak kabul edilir.
db-schemas = "api,public"

# Kimlik doğrulaması (JWT) olmayan isteklerin hangi veritabanı rolüyle çalışacağını belirtir.
# GÜVENLİK UYARISI: Bu rolün veritabanındaki yetkileri son derece kısıtlı olmalıdır.
db-anon-role = "anon"

# --- TALEP ÖNCESİ TETİKLEYİCİ (PRE-REQUEST) ---
# NOT: db-pre-request kaldırıldı. JWT secret'ı PostgreSQL'e PGRST_DB_URI içindeki
# `options` parametresi ile iletilir (bkz. docker-compose.yaml).
# api.set_jwt_secret fonksiyonu hâlen veritabanında bulunur ama kullanılmaz.

# --- VERİTABANI BAĞLANTI HAVUZU (CONNECTION POOL) ---

# Veritabanı ile kurulacak maksimum aktif bağlantı sayısı.
# Performans ve kaynak tüketimi dengesi için 10 ideal bir başlangıç değeridir.
db-pool = 10

# Havuzdaki bağlantıların en fazla ne kadar süre (milisaniye) boşta kalabileceğini belirler.
db-pool-timeout = 10000

# Havuzun edinme zaman aşımı süresi (milisaniye).
db-pool-acquisition-timeout = 10000

# --- SUNUCU AYARLARI ---

# Sunucunun dinleyeceği IP adresi. 
# Docker konteyner içi iletişim için "0.0.0.0" (tüm arayüzler) olmalıdır.
server-host = "0.0.0.0"

# Sunucunun dinleyeceği port.
server-port = 3000

# --- PERFORMANS VE SINIRLANDIRMALAR ---

# Bir istekte dönecek maksimum satır sayısı (boş bırakılırsa sınırsızdır).
# Sunucu belleğini korumak için sınırlandırılması önerilir (Örn: max-rows = 1000).
# max-rows = 1000

# API dokümantasyonu için OpenAPI spesifikasyonunun nasıl davranacağını belirler.
# "follow-privileges" -> İstek atan rolün yetkilerine göre dinamik OpenAPI şeması sunar.
openapi-mode = "follow-privileges"