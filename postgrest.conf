# PostgREST configuration for MMPI Test System
# Connects to PostgreSQL at hostname: postgres_db
# Start: postgrest postgrest.conf

db-uri = "postgres://postgres:postgres@postgres_db:5432/mmpi_db"

# Expose the public schema (all tables) and api schema (RPC functions)
db-schema = "public,api"

# Role for unauthenticated requests (can only call api.login)
db-anon-role = "anon"

# Secret for JWT verification (must match what api.login() uses to sign)
jwt-secret = "super-secret-jwt-key-change-this-in-production"

# Set the JWT secret as a session variable so api.login() can read it
db-pre-request = "SET app.jwt_secret = 'super-secret-jwt-key-change-this-in-production'"

server-port = 3000
server-host = "0.0.0.0"

# Allow CORS from the web app origin
cors-origin = "*"
