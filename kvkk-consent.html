<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVKK ve Onam Metni - MMPI Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <script src="assets/js/pg-config.js"></script>
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="row w-100">
            <div class="col-12 col-md-11 col-lg-10 mx-auto">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center">
                        <h2 class="mb-0" id="kvkkTitle">KVKK ve Onam Metni</h2>
                    </div>
                    <div class="card-body p-0">
                        <div class="consent-text" style="max-height: 400px; overflow-y: auto; border: 1px solid #dee2e6; padding: 20px; border-radius: 5px; background-color: #f8f9fa;">
                            <div id="kvkkContent">
                                <!-- KVKK metni buraya dinamik olarak yüklenecek -->
                                <div class="text-center">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Yükleniyor...</span>
                                    </div>
                                    <p class="mt-2">KVKK metni yükleniyor...</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <!-- Uyarı mesajı alanı -->
                            <div id="warningMessage" class="alert alert-warning d-none mb-3" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <strong>Lütfen KVKK metnini kabul ettiğinizi belirtmek için aşağıdaki kutucuğu işaretleyiniz.</strong>
                            </div>
                            
                            <div class="form-check p-3 border border-primary rounded bg-light">
                                <input class="form-check-input" type="checkbox" id="kvkkConsent" required style="transform: scale(1.7); margin-right: 15px; accent-color: #0d6efd; border: 1px solid #0d6efd; border-radius: 4px;">
                                <label class="form-check-label" for="kvkkConsent" style="cursor: pointer; font-size: 16px; line-height: 1.5;">
                                    <strong>✓ Yukarıda yer alan KVKK metnini okudum, anladım ve kabul ediyorum. Kişisel verilerimin belirtilen amaçlar doğrultusunda işlenmesine açık rızam bulunmaktadır.</strong>
                                </label>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <div class="row g-1">
                                <div class="col-6">
                                    <button type="button" class="btn btn-secondary btn-mobile w-100" onclick="goBack()">
                                        <i class="fas fa-arrow-left me-1"></i>Geri Dön
                                    </button>
                                </div>
                                <div class="col-6">
                                    <button type="button" class="btn btn-success btn-mobile w-100" id="acceptBtn" onclick="acceptConsent()">
                                        <i class="fas fa-check me-1"></i>Kabul Et
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Checkbox durumunu kontrol et
        document.getElementById('kvkkConsent').addEventListener('change', function() {
            const warningMessage = document.getElementById('warningMessage');
            
            if (this.checked) {
                // Checkbox işaretlendiğinde uyarı mesajını gizle
                warningMessage.classList.add('d-none');
                
                // Checkbox alanının stilini normale döndür
                const checkboxContainer = this.closest('.form-check');
                checkboxContainer.style.border = '1px solid #0d6efd';
                checkboxContainer.style.backgroundColor = '#f8f9fa';
            }
        });
        
        // Onay fonksiyonu
        function acceptConsent() {
            const checkbox = document.getElementById('kvkkConsent');
            const warningMessage = document.getElementById('warningMessage');
            
            if (!checkbox.checked) {
                // Uyarı mesajını göster
                warningMessage.classList.remove('d-none');
                
                // Checkbox'a odaklan
                checkbox.focus();
                
                // Checkbox alanını vurgula
                const checkboxContainer = checkbox.closest('.form-check');
                checkboxContainer.style.border = '2px solid #dc3545';
                checkboxContainer.style.backgroundColor = '#f8d7da';
                
                // Uyarı mesajına kaydır
                warningMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // 5 saniye sonra vurgulamayı kaldır
                setTimeout(() => {
                    checkboxContainer.style.border = '1px solid #0d6efd';
                    checkboxContainer.style.backgroundColor = '#f8f9fa';
                }, 5000);
                
                return;
            }
            
            // Uyarı mesajını gizle
            warningMessage.classList.add('d-none');
            
            // KVKK onayını localStorage'a kaydet
            localStorage.setItem('kvkkConsent', 'true');
            localStorage.setItem('kvkkConsentDate', new Date().toISOString());
            
            // Test sayfasına yönlendir
            window.location.href = 'mmpi-test.html';
        }
        
        // Geri dön fonksiyonu
        function goBack() {
            window.history.back();
        }
        
        // KVKK metnini PG_API'den yükle
        async function loadKvkkContent() {
            try {
                const { data, error } = await PG_API
                    .from('kvkk')
                    .select('*')
                    .eq('id', 1)
                    .single();
                
                if (error) {
                    console.error('KVKK ayarları yüklenirken hata:', error);
                    // Hata durumunda varsayılan metni göster
                    loadDefaultKvkkContent();
                    return;
                }
                
                if (data) {
                    // Başlığı güncelle
                    if (data.kvkk_title) {
                        document.getElementById('kvkkTitle').textContent = data.kvkk_title;
                    }
                    
                    // İçeriği güncelle
                    if (data.kvkk_text) {
                        document.getElementById('kvkkContent').innerHTML = data.kvkk_text;
                    } else {
                        loadDefaultKvkkContent();
                    }
                } else {
                    // Veri yoksa varsayılan metni göster
                    loadDefaultKvkkContent();
                }
                
            } catch (error) {
                console.error('KVKK metni yüklenirken hata:', error);
                loadDefaultKvkkContent();
            }
        }
        
        // Varsayılan KVKK metnini yükle
        function loadDefaultKvkkContent() {
            // Varsayılan başlığı ayarla
            document.getElementById('kvkkTitle').textContent = 'KVKK ve Onam Metni';
            
            const defaultKvkkText = `
                <h4 class="text-center mb-4">MİNNESOTA ÇOK YÖNLÜ KİŞİLİK ENVANTERİ (MMPI) TESTİ</h4>
                <h5 class="text-center mb-4">KİŞİSEL VERİLERİN KORUNMASI KANUNU HAKKINDA AÇIKLAMALAR VE MUVAFAKATNAME</h5>
                
                <h6><strong>1. BİLGİLENDİRME</strong></h6>
                <p>MMPI Testinin açılımı Minnesota Çok Yönlü Kişilik Envanteri. Bu test bireyin kişisel ve toplumsal uyumunu objektif olarak değerlendirmeyi amaçlayan bir testtir.</p>
                
                <h6><strong>Veri Sorumlusu</strong></h6>
                <p>6638 sayılı Kişisel Verilerin Korunması Kanunu ("6698 sayılı Kanun") uyarınca, kişisel verileriniz; veri sorumlusu olarak OGULTURK AŞ ("ŞİRKET") tarafından aşağıda açıklanan kapsamda toplanacak, işlenebilecek ve ilgili birim sorumlusu ile paylaşılacaktır.</p>
                <p>Şirketimiz, katılımcılara ilişkin kişisel veriler bakımından 6698 sayılı Kişisel Verilerin Korunması Kanunu kapsamında "veri sorumlusu" sıfatına sahip olup işbu Aydınlatma Metni ile söz konusu Kanun uyarınca katılımcıların Şirket tarafından gerçekleştirilen kişisel veri işleme faaliyetleri hakkında aydınlatılması hedeflenmektedir.</p>
                
                <p>E-posta yoluyla yapmak istediğiniz başvurularınızı ogulturkselma@gmail.com adresine yapabilirsiniz.</p>
                
                <h6><strong>Araştırmayla İlgili Bilgiler:</strong></h6>
                <p><strong>Araştırmanın Nedeni:</strong> Riskleri önlemek ve daha kaliteli hizmet sağlamak.</p>
                <p><strong>Süresi:</strong> 60-90 dk</p>
                <p><strong>Araştırmanın Yürütüleceği Yer:</strong> İlgili Proje kvkk-calisan-bilgi adresinde yer alan OGULTURK A.Ş</p>
                
                <div class="alert alert-info mt-3">
                    <p class="mb-0"><strong>KİŞİSEL VERİLERİN KORUNMASI KANUNU HAKKINDA ÇALIŞAN BİLGİLENDİRME yazısını aldım, okudum ve anladım</strong></p>
                </div>
                
                <h6><strong>2. MUVAFAKATNAME</strong></h6>
                <p>OGULTURK A.Ş. MMPI Testi esnasında alınan 6698 sayılı Kişisel Verilerin Korunması Kanunu kapsamında yer alan kişisel verilerimin/özel nitelikli kişisel verilerimin alınmasına, işlenmesine, aktarılmasına, silinmesine, anonim hale getirilmesine ve sair surette işlenmesine ve 2 yıl müddetle muhafaza edilmesine özgür irademle açık rızamla <strong>MUVAFAKAT EDİYORUM.</strong></p>
                
                <p><strong>Not:</strong> KVKK metni PG_API'den yüklenemedi. Varsayılan metin gösteriliyor.</p>
            `;
            document.getElementById('kvkkContent').innerHTML = defaultKvkkText;
        }
        
        // Sayfa yüklendiğinde kontrolleri yap
        window.addEventListener('DOMContentLoaded', function() {
            // Kişisel bilgilerin girilip girilmediğini kontrol et
            const personalInfo = localStorage.getItem('mmpiPersonalInfo');
            if (!personalInfo) {
                // Kişisel bilgiler girilmemişse ana sayfaya yönlendir
               // alert('Bu sayfaya erişmek için önce kişisel bilgilerinizi girmelisiniz.');
                window.location.href = 'index.html';
                return;
            }
            
            // KVKK metnini yükle
            loadKvkkContent();
            
            // Checkbox her zaman boş başlasın
            document.getElementById('kvkkConsent').checked = false;
        });
    </script>
</body>
</html>
