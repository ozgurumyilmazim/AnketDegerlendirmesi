<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMPI Testi - Psikolojik Test Sistemi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="card fade-in">
                <div class="logo">
                    <div class="d-flex justify-content-between align-items-center">
                        <h1><i class="fas fa-brain"></i> MMPI Testi</h1>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="mmpiTest.editPersonalInfo()">
                            <i class="fas fa-user-edit"></i> Kişisel Bilgileri Düzenle
                        </button>
                    </div>
                </div>
                
                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%">
                        <div class="progress-text" id="progressText">0 / 0</div>
                    </div>
                </div>
                
                <!-- Bilmiyorum Sayacı -->
                <div class="alert alert-info" id="dontKnowCounter">
                    <i class="fas fa-info-circle"></i> 
                    <strong>Bilmiyorum Hakkı:</strong> <span id="dontKnowCount">10</span> / 10 kaldı
                </div>
                
                <!-- Soru Konteyner -->
                <div class="question-container" id="questionContainer">
                    <div class="question-text" id="questionText">
                        Test yükleniyor...
                    </div>
                    
                    <div class="answer-options" id="answerOptions">
                        <div class="answer-option">
                            <input type="radio" id="answerTrue" name="answer" value="true">
                            <label for="answerTrue">
                                <i class="fas fa-check"></i> Doğru
                            </label>
                        </div>
                        
                        <div class="answer-option">
                            <input type="radio" id="answerFalse" name="answer" value="false">
                            <label for="answerFalse">
                                <i class="fas fa-times"></i> Yanlış
                            </label>
                        </div>
                        
                        <div class="answer-option dont-know">
                            <input type="radio" id="answerDontKnow" name="answer" value="dont_know">
                            <label for="answerDontKnow">
                                <i class="fas fa-question"></i> Bilmiyorum
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- Uyarı Mesajları -->
                <div class="alert alert-warning" id="warningMessage" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="warningText"></span>
                </div>
                
                <!-- Navigasyon Butonları -->
                <div class="mt-3">
                    <div class="row g-1">
                        <div class="col-6">
                            <button type="button" class="btn btn-secondary btn-mobile w-100" id="prevBtn" disabled>
                                <i class="fas fa-arrow-left"></i> Önceki
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button" class="btn btn-primary btn-mobile w-100" id="nextBtn" disabled>
                                Sonraki <i class="fas fa-arrow-right"></i>
                            </button>
                            <button type="button" class="btn btn-success btn-mobile w-100" id="finishBtn" style="display: none;">
                                <i class="fas fa-check-circle"></i> Tamamla
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Test Bilgileri -->
                <div class="mt-4 text-center">
                    <small class="text-muted">
                        <i class="fas fa-clock"></i> Tahmini Süre: 60-90 dakika |
                        <i class="fas fa-shield-alt"></i> Verileriniz güvenli bir şekilde saklanmaktadır
                    </small>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="loading mb-3"></div>
                    <h5>Test sonuçlarınız kaydediliyor...</h5>
                    <p class="text-muted">Lütfen bekleyiniz, bu işlem birkaç saniye sürebilir.</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Test Config -->
    <script src="assets/js/test-config.js"></script>
    
    <!-- MMPI Scoring -->
    <script src="assets/js/mmpi-scoring.js"></script>
    
    <!-- PG Config -->
    <script src="assets/js/pg-config.js"></script>
    
    <!-- Supabase Config -->
    <script src="assets/js/supabase-config.js"></script>
    
    <!-- Test Logic -->
    <script src="assets/js/mmpi-test.js"></script>
    
    <!-- Erişim Kontrolü -->
    <script>
        // Sayfa yüklendiğinde erişim kontrolü yap
        $(document).ready(function() {
            // KVKK onayı kontrolü
            const kvkkConsent = localStorage.getItem('kvkkConsent');
            if (!kvkkConsent || kvkkConsent !== 'true') {
                //alert('Bu sayfaya erişmek için önce KVKK sözleşmesini kabul etmelisiniz.');
                window.location.href = 'index.html';
                return;
            }
            
            // Kişisel bilgiler kontrolü
            const personalInfo = localStorage.getItem('mmpiPersonalInfo');
            if (!personalInfo) {
                //alert('Bu sayfaya erişmek için önce kişisel bilgilerinizi girmelisiniz.');
                window.location.href = 'index.html';
                return;
            }
            
            // Test sonuçları kontrolü - eğer test tamamlanmışsa bu sayfaya erişimi engelle
            const testResults = localStorage.getItem('mmpiTestResults');
            const participantInfo = JSON.parse(personalInfo);
            
            if (testResults) {
                const results = JSON.parse(testResults);
                // Sadece aynı katılımcının tamamlanmış testi varsa yönlendir
                if (results.createdAt && results.tcNo && 
                    results.tcNo === participantInfo.tcNo) {
                    alert('Bu TC kimlik numarası ile test zaten tamamlanmış. Sonuçları görüntülemek için raporlar sayfasına yönlendiriliyorsunuz.');
                    window.location.href = 'test-complete.html';
                    return;
                }
                // Farklı katılımcının test verileri varsa temizle
                else if (results.tcNo && results.tcNo !== participantInfo.tcNo) {
                    localStorage.removeItem('mmpiTestResults');
                }
            }
        });
    </script>

    <!-- Kişisel Bilgileri Düzenle Modal -->
    <div class="modal fade" id="editInfoModal" tabindex="-1" aria-labelledby="editInfoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editInfoModalLabel">
                        <i class="fas fa-user-edit"></i> Kişisel Bilgileri Düzenle
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editPersonalInfoForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editFirstName" class="form-label">Ad *</label>
                                    <input type="text" class="form-control" id="editFirstName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editLastName" class="form-label">Soyad *</label>
                                    <input type="text" class="form-control" id="editLastName" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editTcNo" class="form-label">TC Kimlik No *</label>
                                    <input type="text" class="form-control" id="editTcNo" maxlength="11" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editAge" class="form-label">Yaş *</label>
                                    <input type="number" class="form-control" id="editAge" min="16" max="100" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editGender" class="form-label">Cinsiyet *</label>
                                    <select class="form-select" id="editGender" required>
                                        <option value="">Seçiniz</option>
                                        <option value="male">Erkek</option>
                                        <option value="female">Kadın</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editEducation" class="form-label">Eğitim Durumu *</label>
                                    <select class="form-select" id="editEducation" required>
                                        <option value="">Seçiniz</option>
                                        <option value="İlkokul">İlkokul</option>
                                        <option value="Ortaokul">Ortaokul</option>
                                        <option value="Lise">Lise</option>
                                        <option value="Lisans">Lisans</option>
                                        <option value="Yüksek Lisans">Yüksek Lisans</option>
                                        <option value="Doktora">Doktora</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editMaritalStatus" class="form-label">Medeni Durum *</label>
                                    <select class="form-select" id="editMaritalStatus" required>
                                        <option value="">Seçiniz</option>
                                        <option value="Bekar">Bekar</option>
                                        <option value="Evli">Evli</option>
                                        <option value="Boşanmış">Boşanmış</option>
                                        <option value="Dul">Dul</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editProfession" class="form-label">Meslek</label>
                                    <input type="text" class="form-control" id="editProfession">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editInstitutionCode" class="form-label">Kurum Kodu</label>
                                    <input type="text" class="form-control" id="editInstitutionCode">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="editInstitutionName" class="form-label">Kurum Adı</label>
                                    <input type="text" class="form-control" id="editInstitutionName">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i> İptal
                    </button>
                    <button type="button" class="btn btn-primary" id="savePersonalInfoBtn">
                        <i class="fas fa-save"></i> Kaydet ve Teste Devam Et
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
