<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Durumu — Anket Değerlendirme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .header h1 { font-weight: 700; }
        .header .subtitle { opacity: .8; font-size: .95rem; }
        .check-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            margin-bottom: 1.25rem;
            overflow: hidden;
            transition: box-shadow .2s;
        }
        .check-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        .check-header {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            user-select: none;
        }
        .check-header .icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .icon.pass { background: #d4edda; color: #155724; }
        .icon.fail { background: #f8d7da; color: #721c24; }
        .icon.pending { background: #fff3cd; color: #856404; }
        .icon.running { background: #cce5ff; color: #004085; }

        .check-title { flex: 1; font-weight: 600; font-size: 1rem; }
        .check-badge {
            font-size: .75rem;
            padding: .2rem .65rem;
            border-radius: 20px;
            font-weight: 600;
        }
        .check-body {
            padding: 0 1.25rem 1rem;
            display: none;
        }
        .check-body.open { display: block; }
        .check-body pre {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .82rem;
            max-height: 300px;
            overflow: auto;
        }
        .summary-bar {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .summary-item {
            background: #fff;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            flex: 1;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,.05);
        }
        .summary-item .num { font-size: 2rem; font-weight: 700; }
        .summary-item .label { font-size: .82rem; color: #6c757d; }
        .btn-run-all {
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            border: none;
            color: #fff;
            padding: .6rem 2rem;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-run-all:hover { opacity: .9; color: #fff; }
        .timestamp { font-size: .8rem; color: #6c757d; }
        .server-info {
            background: #fff;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,.05);
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        .server-info dt { font-size: .78rem; color: #6c757d; font-weight: 500; }
        .server-info dd { font-weight: 600; margin: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fa-spin-custom { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <h1><i class="fas fa-heartbeat me-2"></i>Sistem Durumu</h1>
        <div class="subtitle">Tüm servislerin tek panelden kontrolü</div>
    </div>
</div>

<div class="container">

    <!-- Summary -->
    <div class="summary-bar" id="summaryBar">
        <div class="summary-item"><div class="num" id="sumTotal">0</div><div class="label">Kontrol</div></div>
        <div class="summary-item"><div class="num text-success" id="sumPass">0</div><div class="label">Başarılı</div></div>
        <div class="summary-item"><div class="num text-danger" id="sumFail">0</div><div class="label">Başarısız</div></div>
        <div class="summary-item"><div class="num text-warning" id="sumPending">0</div><div class="label">Bekliyor</div></div>
    </div>

    <!-- Actions -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
            <button class="btn-run-all" id="runAllBtn"><i class="fas fa-play me-2"></i>Tüm Testleri Çalıştır</button>
            <button class="btn btn-outline-secondary btn-sm ms-2" id="expandAllBtn"><i class="fas fa-chevron-down me-1"></i>Tümünü Genişlet</button>
            <button class="btn btn-outline-secondary btn-sm" id="collapseAllBtn"><i class="fas fa-chevron-up me-1"></i>Daralt</button>
        </div>
        <div class="timestamp" id="timestamp">—</div>
    </div>

    <!-- Server info -->
    <div class="server-info">
        <div>
            <dt>Hostname</dt>
            <dd id="siHostname">—</dd>
        </div>
        <div>
            <dt>PostgREST URL</dt>
            <dd id="siApiUrl">—</dd>
        </div>
        <div>
            <dt>User-Agent</dt>
            <dd id="siUa" style="font-size:.82rem;">—</dd>
        </div>
    </div>

    <!-- Check cards -->
    <div id="checksContainer"></div>

    <hr class="my-4">
    <p class="text-center text-muted small">
        <i class="fas fa-info-circle me-1"></i>
        Bu sayfa sistem bileşenlerinin durumunu kontrol eder.
        Herhangi bir sorun varsa ilgili kartın üzerine tıklayarak detayları görebilirsiniz.
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/test-config.js"></script>
<script src="../assets/js/mmpi-scoring.js"></script>
<script src="../assets/js/pg-config.js"></script>
<script>
// ================================================================
// Sistem Durumu Kontrol Paneli
// ================================================================

const CHECKS = [];

function define(id, title, runFn, opts = {}) {
    const c = {
        id,
        title,
        runFn,
        status: 'pending',  // pending | running | pass | fail | skip
        message: 'Test bekliyor...',
        detail: null,
        dependsOn: opts.dependsOn || null,
    };
    CHECKS.push(c);
    return c;
}

// ---------- Check definitions ----------

define('nginx', 'Web Sunucu (Nginx) Çalışıyor', async () => {
    // Simply loading this page is proof the web server works.
    const res = await fetch(window.location.href, { method: 'HEAD' });
    return { status: 'pass', message: `HTTP ${res.status} — sunucu yanıt veriyor`, detail: {
        url: window.location.href,
        status: res.status,
        statusText: res.statusText,
        contentType: res.headers.get('content-type'),
        server: res.headers.get('server') || '—',
    }};
});

define('localStorage', 'localStorage Kullanılabilir', async () => {
    const key = '_mmpi_status_test_';
    localStorage.setItem(key, 'ok');
    const v = localStorage.getItem(key);
    localStorage.removeItem(key);
    if (v !== 'ok') throw new Error('localStorage okuma/yazma hatası');
    return { status: 'pass', message: 'localStorage okuma/yazma başarılı', detail: {
        remaining: localStorage.length + ' anahtar'
    }};
});

define('jsLibs', 'JavaScript Kütüphaneleri Yüklü', async () => {
    const libs = {
        'test-config': typeof testConfig !== 'undefined',
        'mmpi-scoring': typeof MMPIScoring !== 'undefined',
        'pg-config': typeof PG_CONFIG !== 'undefined' && typeof PG_API !== 'undefined',
        'supabase (compat)': typeof supabase !== 'undefined',
    };
    const allOk = Object.values(libs).every(Boolean);
    if (!allOk) {
        const missing = Object.entries(libs).filter(([,v]) => !v).map(([k]) => k);
        throw new Error('Eksik: ' + missing.join(', '));
    }
    return { status: 'pass', message: 'Tüm kütüphaneler yüklendi', detail: libs };
});

define('apiReachable', 'PostgREST API Erişilebilir', async () => {
    const url = PG_CONFIG.apiUrl;
    // PostgREST returns 404 on root with CORS headers – that's fine, means it's alive
    const res = await fetch(url, { method: 'OPTIONS' });
    if (res.ok || res.status === 404 || res.status === 401) {
        return { status: 'pass', message: `${url} — yanıt alındı`, detail: {
            url,
            status: res.status,
            cors: res.headers.get('access-control-allow-origin'),
        }};
    }
    throw new Error(`HTTP ${res.status} — ${res.statusText}`);
}, { dependsOn: 'jsLibs' });

define('authEndpoint', 'Auth /rpc/login Çalışıyor', async () => {
    const url = PG_CONFIG.apiUrl + '/rpc/login';
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@test.test', password: 'wrong' }),
    });
    const body = await res.json();
    // Should get a proper auth error, not a connection error
    if (res.status === 401 || res.status === 400 || (body && body.message)) {
        return { status: 'pass', message: 'Auth endpoint çalışıyor (beklenen hata döndü)', detail: {
            status: res.status,
            response: body
        }};
    }
    // If somehow it succeeds, that's unexpected but not a failure
    return { status: 'pass', message: 'Auth endpoint yanıt veriyor', detail: { status: res.status, body }};
}, { dependsOn: 'apiReachable' });

define('questionsQuery', 'Sorgu Çalışıyor (questions)', async () => {
    const { data, error } = await supabase.from('questions').select('*').limit(3);
    if (error) throw new Error(error);
    if (!data || data.length === 0) throw new Error('questions tablosu boş');
    return { status: 'pass', message: `${data.length} soru getirildi`, detail: data };
}, { dependsOn: 'apiReachable' });

define('dbTables', 'PostgreSQL Tabloları Tam', async () => {
    const expected = [
        'users', 'participants', 'test_results', 'questions', 'reports',
        'scoring_keys', 't_score_norms', 't_score_params', 'mmpi_interpretations',
        'page_content', 'kvkk', 'task_definitions', 'settings', 'sessions'
    ];
    // Query information_schema via PostgREST
    const url = PG_CONFIG.apiUrl + '/information_schema.tables?select=table_name&table_schema=eq.public';
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) {
        // information_schema may be inaccessible; try listing known tables via SELECT count
        const existing = [];
        for (const tbl of expected) {
            const { data, error } = await supabase.from(tbl).select('*').limit(1);
            if (!error) existing.push(tbl);
        }
        const missing = expected.filter(t => !existing.includes(t));
        if (missing.length) throw new Error('Eksik tablolar: ' + missing.join(', '));
        return { status: 'pass', message: `${existing.length}/${expected.length} tablo mevcut`, detail: { existing, expected } };
    }
    const data = await res.json();
    const found = data.map(r => r.table_name);
    const missing = expected.filter(t => !found.includes(t));
    if (missing.length) throw new Error('Eksik tablolar: ' + missing.join(', '));
    return { status: 'pass', message: `${found.length}/${expected.length} tablo mevcut`, detail: { found, expected } };
}, { dependsOn: 'apiReachable' });

define('questionsCount', 'Soru Sayısı Beklenen Gibi', async () => {
    const { data, error } = await supabase.from('questions').select('*');
    if (error) throw new Error(error);
    const count = data ? data.length : 0;
    // MMPI-2 has 567 questions
    if (count < 567) {
        return { status: 'fail', message: `Sadece ${count} soru bulundu (beklenen: 567)`, detail: { count, expected: 567 } };
    }
    return { status: 'pass', message: `${count} soru mevcut`, detail: { count, expected: 567 } };
}, { dependsOn: 'apiReachable' });

define('testResultCRUD', 'Test Sonucu Ekleme Çalışıyor', async () => {
    const testData = {
        participant_info: { test: 'status-check' },
        test_answers: { '1': 'Doğru' },
        start_time: new Date().toISOString(),
        end_time: new Date().toISOString(),
        dont_know_count: 0,
        completed_questions: 1,
        total_questions: 567,
        status: 'abandoned',
    };
    const { data, error } = await supabase.from('test_results').insert(testData);
    if (error) throw new Error('Insert hatası: ' + error);
    const inserted = Array.isArray(data) ? data[0] : data;
    if (!inserted || !inserted.id) throw new Error('Insert sonucu ID dönmedi');
    // Clean up
    await supabase.from('test_results').delete().eq('id', inserted.id);
    return { status: 'pass', message: 'Test sonucu ekleme/silme başarılı', detail: { id: inserted.id } };
}, { dependsOn: 'apiReachable' });

define('apiMe', 'PostgREST /rpc/me Çalışıyor', async () => {
    const url = PG_CONFIG.apiUrl + '/rpc/me';
    const res = await fetch(url, { headers: { 'Content-Type': 'application/json' } });
    // Should return 401 (unauth) or the function may not exist — either is ok
    if (res.status === 401 || res.status === 200) {
        const body = res.status === 200 ? await res.json() : null;
        return { status: 'pass', message: `/rpc/me yanıt verdi (HTTP ${res.status})`, detail: { status: res.status, body } };
    }
    // 404 means the endpoint might not be defined yet
    return { status: 'pass', message: `/rpc/me mevcut değil (HTTP ${res.status}) — opsiyonel`, detail: { status: res.status } };
}, { dependsOn: 'apiReachable' });

define('cors', 'CORS Başlıkları Var', async () => {
    const url = PG_CONFIG.apiUrl + '/questions?limit=1';
    const res = await fetch(url);
    const acao = res.headers.get('access-control-allow-origin');
    const aceh = res.headers.get('access-control-expose-headers');
    if (!acao) {
        return { status: 'fail', message: 'access-control-allow-origin eksik', detail: { url, headers: [...res.headers].reduce((o,[k,v]) => (o[k]=v,o), {}) } };
    }
    return { status: 'pass', message: `access-control-allow-origin: ${acao}`, detail: { 'access-control-allow-origin': acao, 'access-control-expose-headers': aceh } };
}, { dependsOn: 'apiReachable' });

define('pgVersion', 'PostgreSQL Sürüm Bilgisi', async () => {
    // Try to get PG version via a postgrest query
    const url = PG_CONFIG.apiUrl + '/rpc/me';
    try {
        const res = await fetch(url);
        // Even a 401 means we reached the DB (rpc/me is a DB function)
        return { status: 'pass', message: 'PostgreSQL çalışıyor (PostgREST üzerinden erişildi)', detail: { note: 'Sürüm bilgisi doğrudan alınamadı ama DB yanıt veriyor' } };
    } catch (e) {
        throw new Error('PostgreSQL erişilebilir değil: ' + e.message);
    }
}, { dependsOn: 'apiReachable' });

define('dnsResolution', 'DNS Çözümleme', async () => {
    const hostname = new URL(PG_CONFIG.apiUrl).hostname;
    try {
        // Use an external DNS-over-HTTPS for resolution check
        const dnsRes = await fetch(`https://dns.google/resolve?name=${hostname}&type=A`);
        const dnsData = await dnsRes.json();
        if (dnsData && dnsData.Answer && dnsData.Answer.length > 0) {
            const ips = dnsData.Answer.map(a => a.data);
            return { status: 'pass', message: `${hostname} → ${ips.join(', ')}`, detail: dnsData };
        }
        // If DNS-over-HTTPS fails, we can still see if the API resolved by trying to reach it
        return { status: 'pass', message: `${hostname} çözümlendi (API erişilebilir)`, detail: { hostname } };
    } catch (e) {
        // DNS check failure isn't critical since apiReachable already passed
        return { status: 'pass', message: 'DNS çözümleme kontrolü atlandı (API zaten erişilebilir)', detail: { hostname, note: 'DNS sorgusu başarısız ama API çalışıyor' } };
    }
}, { dependsOn: 'apiReachable' });

// ================================================================
// Runner
// ================================================================

function render() {
    const container = document.getElementById('checksContainer');
    container.innerHTML = CHECKS.map(c => `
        <div class="check-card" data-check-id="${c.id}">
            <div class="check-header" onclick="toggleBody('${c.id}')">
                <div class="icon pending" id="icon-${c.id}"><i class="fas fa-clock"></i></div>
                <span class="check-title">${c.title}</span>
                <span class="check-badge bg-secondary" id="badge-${c.id}">Bekliyor</span>
            </div>
            <div class="check-body" id="body-${c.id}">
                <div class="mb-2" id="msg-${c.id}">Test bekliyor...</div>
                <pre id="detail-${c.id}"></pre>
            </div>
        </div>
    `).join('');
    updateSummary();
}

function toggleBody(id) {
    const el = document.getElementById('body-' + id);
    el.classList.toggle('open');
}

function updateSummary() {
    const total = CHECKS.length;
    const pass = CHECKS.filter(c => c.status === 'pass').length;
    const fail = CHECKS.filter(c => c.status === 'fail').length;
    const pending = CHECKS.filter(c => c.status === 'pending' || c.status === 'running').length;
    document.getElementById('sumTotal').textContent = total;
    document.getElementById('sumPass').textContent = pass;
    document.getElementById('sumFail').textContent = fail;
    document.getElementById('sumPending').textContent = pending;
    document.getElementById('timestamp').textContent = new Date().toLocaleString('tr-TR');
}

function updateCheck(id, { status, message, detail }) {
    const c = CHECKS.find(x => x.id === id);
    if (!c) return;
    c.status = status;
    c.message = message || '';
    c.detail = detail || null;

    const icon = document.getElementById('icon-' + id);
    const badge = document.getElementById('badge-' + id);
    const msgEl = document.getElementById('msg-' + id);
    const detailEl = document.getElementById('detail-' + id);

    const iconMap = {
        pass: '<i class="fas fa-check"></i>',
        fail: '<i class="fas fa-times"></i>',
        running: '<i class="fas fa-spinner fa-spin-custom"></i>',
        pending: '<i class="fas fa-clock"></i>',
    };
    const clsMap = {
        pass: 'pass',
        fail: 'fail',
        running: 'running',
        pending: 'pending',
    };
    const badgeMap = {
        pass: 'bg-success',
        fail: 'bg-danger',
        running: 'bg-primary',
        pending: 'bg-secondary',
    };
    const labelMap = {
        pass: 'Başarılı',
        fail: 'Başarısız',
        running: 'Çalışıyor...',
        pending: 'Bekliyor',
    };

    icon.className = 'icon ' + (clsMap[status] || 'pending');
    icon.innerHTML = iconMap[status] || iconMap.pending;

    badge.className = 'check-badge ' + (badgeMap[status] || 'bg-secondary');
    badge.textContent = labelMap[status] || 'Bekliyor';

    msgEl.textContent = message || '';
    detailEl.textContent = detail ? JSON.stringify(detail, null, 2) : '';

    updateSummary();
}

async function runCheck(id) {
    const c = CHECKS.find(x => x.id === id);
    if (!c) return;

    // Check dependency
    if (c.dependsOn) {
        const dep = CHECKS.find(x => x.id === c.dependsOn);
        if (dep && dep.status === 'fail') {
            updateCheck(id, { status: 'skip', message: `Bağımlılık "${c.dependsOn}" başarısız — atlandı`, detail: null });
            return;
        }
    }

    updateCheck(id, { status: 'running', message: 'Test çalıştırılıyor...', detail: null });
    try {
        const result = await c.runFn();
        updateCheck(id, { status: 'pass', message: result.message, detail: result.detail || null });
    } catch (err) {
        updateCheck(id, { status: 'fail', message: err.message || 'Beklenmeyen hata', detail: err.stack || null });
    }
}

async function runAll() {
    for (const c of CHECKS) {
        await runCheck(c.id);
    }
}

// ================================================================
// Boot
// ================================================================

document.addEventListener('DOMContentLoaded', () => {
    // Server info
    document.getElementById('siHostname').textContent = window.location.hostname;
    document.getElementById('siApiUrl').textContent = typeof PG_CONFIG !== 'undefined' ? PG_CONFIG.apiUrl : '—';
    document.getElementById('siUa').textContent = navigator.userAgent;

    render();

    document.getElementById('runAllBtn').addEventListener('click', runAll);
    document.getElementById('expandAllBtn').addEventListener('click', () => {
        document.querySelectorAll('.check-body').forEach(el => el.classList.add('open'));
    });
    document.getElementById('collapseAllBtn').addEventListener('click', () => {
        document.querySelectorAll('.check-body').forEach(el => el.classList.remove('open'));
    });

    // Auto-run after 500ms
    setTimeout(runAll, 500);
});
</script>
</body>
</html>
