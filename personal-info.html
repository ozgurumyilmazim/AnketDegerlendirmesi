<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Bilgiler - MMPI Test</title>
    <link rel="icon" type="image/svg+xml" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="row w-100">
            <div class="col-md-8 col-lg-6 mx-auto">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center">
                        <h2 class="mb-0">Kişisel Bilgiler</h2>
                    </div>
                    <div class="card-body p-4">
                        <!-- Hata mesajı container -->
                        <div id="errorMessage" class="alert alert-danger" style="display: none;">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <span id="errorText"></span>
                        </div>
                        
                        <form id="personalInfoForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">Ad *</label>
                                    <input type="text" class="form-control" id="firstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Soyad *</label>
                                    <input type="text" class="form-control" id="lastName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="tcNo" class="form-label">TC Kimlik No *</label>
                                <input type="text" class="form-control" id="tcNo" maxlength="11" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="gender" class="form-label">Cinsiyet *</label>
                                    <select class="form-select" id="gender" required>
                                        <option value="">Seçiniz</option>
                                        <option value="male">Erkek</option>
                                        <option value="female">Kadın</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="age" class="form-label">Yaş *</label>
                                    <input type="number" class="form-control" id="age" min="16" max="150" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="institutionCode" class="form-label">Kurum Kodu</label>
                                    <input type="text" class="form-control" id="institutionCode">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="institutionName" class="form-label">Kurum Adı</label>
                                    <input type="text" class="form-control" id="institutionName">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="profession" class="form-label">Meslek</label>
                                <input type="text" class="form-control" id="profession">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="education" class="form-label">Eğitim Seviyesi *</label>
                                    <select class="form-select" id="education" required>
                                        <option value="">Seçiniz</option>
                                        <option value="İlkokul">İlkokul</option>
                                        <option value="Ortaokul">Ortaokul</option>
                                        <option value="Lise">Lise</option>
                                        <option value="Lisans">Lisans</option>
                                        <option value="Yüksek Lisans">Yüksek Lisans</option>
                                        <option value="Doktora">Doktora</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="maritalStatus" class="form-label">Medeni Durum *</label>
                                    <select class="form-select" id="maritalStatus" required>
                                        <option value="">Seçiniz</option>
                                        <option value="Bekar">Bekar</option>
                                        <option value="Evli">Evli</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">Devam Et</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/pg-config.js"></script>
    <script src="assets/js/personal-info.js"></script>
</body>
</html>
